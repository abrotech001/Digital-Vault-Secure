kind = "web"
previewPath = "/"
title = "Web3NanoLedger"
version = "1.0.0"
id = "artifacts/web3nano"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19104

[services.development]
run = "pnpm --filter @workspace/web3nano run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/web3nano", "run", "build" ]
publicDir = "artifacts/web3nano/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19104"
BASE_PATH = "/"
